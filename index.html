<script>
    // --- 6. SHARED RENDERERS & SORTING ---
    function renderColToggles() {
        if (finalResults.length === 0) return; const c = document.getElementById('colToggleContainer'); if(!c) return;
        c.innerHTML = Object.keys(finalResults[0]).filter(k => k !== '_RowKey').map(key => {
            let isHidden = hiddenSimpleCols.has(key); let safeKey = key.replace(/'/g, "\\'"); let bg = isHidden ? '#ef4444' : '#10b981';
            return `<button onclick="toggleSimpleCol('${safeKey}')" style="background-color: ${bg}; color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; border: none; cursor: pointer; width: auto; font-weight: bold; margin: 0;">${key}</button>`;
        }).join('');
    }
    function toggleSimpleCol(col) { if (hiddenSimpleCols.has(col)) hiddenSimpleCols.delete(col); else hiddenSimpleCols.add(col); renderBothTables(); renderColToggles(); }

    function sortData(column, keepDirection = false) {
        if (!keepDirection) currentSort = { column: column, direction: currentSort.column === column && currentSort.direction === 'asc' ? 'desc' : 'asc' };
        finalResults.sort((a, b) => {
            let vA = a[column]; let vB = b[column];
            if (typeof vA === 'number' && typeof vB === 'number') { return currentSort.direction === 'asc' ? vA - vB : vB - vA; }
            let strA = (vA ?? "").toString().toLowerCase(); let strB = (vB ?? "").toString().toLowerCase();
            if (strA < strB) return currentSort.direction === 'asc' ? -1 : 1; if (strA > strB) return currentSort.direction === 'asc' ? 1 : -1; 
            return String(a['_RowKey']).localeCompare(String(b['_RowKey'])); 
        }); renderBothTables();
    }

    function renderBothTables() { renderLedgerView(false, 'results'); renderLedgerView(true, 'simpleResults'); }

    function renderLedgerView(isSimple, containerId) {
        if (finalResults.length === 0) return;
        let keys = Object.keys(finalResults[0]).filter(k => k !== '_RowKey' && (!isSimple || !hiddenSimpleCols.has(k)));
        let h = "<table><thead><tr>" + keys.map(k => `<th onclick="sortData('${k.replace(/'/g, "\\'")}')">${k} ✏️ <span class="sort-arrow">${currentSort.column === k ? (currentSort.direction === 'asc' ? "▲" : "▼") : ""}</span></th>`).join('') + "</tr></thead><tbody>";
        finalResults.forEach(r => {
            h += "<tr>" + keys.map(k => {
                let v = r[k]; let cls = "editable"; let dVal = v; let isN = typeof v === 'number';
                if (isN) { cls += ' text-right'; if (k.includes('Cost') || k.includes('Price') || k.includes('Surcharge') || k.includes('Paid') || k.includes('Shipping Cost ($)')) { dVal = "$" + v.toFixed(4); if (k === 'Final Landed Cost ($)') cls += ' highlight-calc'; } else dVal = v.toFixed(2); } else if (v == null) dVal = "";
                if (['Item Name', 'Specification', 'Alibaba Order', 'DI Item ID'].includes(k)) cls += ' trunc-col';
                return `<td class="${cls}" contenteditable="true" onfocus="storeOldVal(this)" onblur="updateDBCell(this, '${r._RowKey}', '${k.replace(/'/g, "\\'")}', ${isN})">${dVal}</td>`;
            }).join('') + "</tr>";
        });
        document.getElementById(containerId).innerHTML = h + "</tbody></table>";
    }

    let oldValTemp = ""; function storeOldVal(cell) { oldValTemp = cell.innerText.trim(); }

    async function updateDBCell(cell, rowKey, uiCol, isN) {
        try {
            let newVal = cell.innerText.trim(); if (newVal === oldValTemp) return; 
            let dbVal = newVal; if (isN) { dbVal = parseFloat(newVal.replace(/[^0-9.-]+/g,"")); if (isNaN(dbVal)) { cell.innerText = oldValTemp; return alert("Valid number required."); } }
            let dbCol = colMap[uiCol]; if(!dbCol) return;
            sysLog(`Edit: [${dbCol}] to [${dbVal}] on [${rowKey}]`); setMasterStatus("Saving...", "mod-working"); document.getElementById('statusMaster').style.display = 'inline-block';
            let p = { [dbCol]: dbVal }; let r = finalResults.find(x => x['_RowKey'] === rowKey);
            if (r && isN) {
                let cQty = parseFloat(r['Quantity']) || 1; let cTot = parseFloat(r['Total Landed Cost ($)']) || 0;
                if (dbCol === 'quantity') { let nc = dbVal > 0 ? cTot / dbVal : 0; p['final_cost_weight'] = nc; p['order_unit_price'] = nc; } 
                else if (dbCol === 'total_cost_weight') { let nc = cQty > 0 ? dbVal / cQty : 0; p['final_cost_weight'] = nc; p['order_unit_price'] = nc; } 
                else if (['final_cost_weight', 'unit_ship_weight', 'order_unit_price'].includes(dbCol)) { p['total_cost_weight'] = dbVal * cQty; if(dbCol === 'final_cost_weight') p['order_unit_price'] = dbVal; }
            }
            let [pNo, di] = rowKey.split(':::');
            const { error } = await supabaseClient.from('full_landed_costs').update(p).eq('parcel_no', pNo).eq('di_item_id', di);
            if (error) throw new Error(error.message);
            setMasterStatus("Saved!", "mod-success"); cell.classList.add('edited-success'); setTimeout(() => cell.classList.remove('edited-success'), 1000);
            if (isN) { await loadData(); } else { r[uiCol] = dbVal; buildCatalogCache(); populateDropdowns(); if(currentProduct) renderProductBOM(); renderBothTables(); }
            setTimeout(() => document.getElementById('statusMaster').style.display = 'none', 2000);
        } catch(err) { sysLog(err.message, true); setMasterStatus("Error", "mod-error"); cell.innerText = oldValTemp; }
    }

    async function addManualItem() {
        try {
            const name = document.getElementById('m_name').value.trim(); 
            const qty = parseFloat(document.getElementById('m_qty').value); 
            const cost = parseFloat(document.getElementById('m_cost').value);
            
            if(!name || isNaN(cost) || isNaN(qty) || qty <= 0) return alert("Valid Name, Qty & Cost required.");
            
            sysLog(`Adding Manual: ${name}`); setMasterStatus("Adding...", "mod-working"); document.getElementById('statusMaster').style.display = 'inline-block';
            
            let payload = {};
            const stringCols = ['order_date', 'order_no', 'parcel_no', 'di_item_id', 'alibaba_order', 'item_name', 'neogleamz_name', 'neogleamz_product', 'specification'];
            
            Object.values(colMap).forEach(dbCol => {
                if (stringCols.includes(dbCol)) { payload[dbCol] = ""; } 
                else { payload[dbCol] = 0; }
            });

            payload.parcel_no = 'MANUAL';
            payload.di_item_id = 'MANUAL-' + Date.now();
            payload.order_no = 'MANUAL';
            payload.alibaba_order = 'MANUAL';
            payload.item_name = name;
            payload.neogleamz_name = document.getElementById('m_neo_name').value.trim();
            payload.neogleamz_product = document.getElementById('m_neo_prod').value.trim();
            payload.specification = document.getElementById('m_spec').value.trim();
            payload.quantity = qty;
            payload.order_unit_price = cost/qty;
            payload.unit_china_landed_price = cost/qty;
            payload.final_cost_weight = cost/qty;
            payload.total_cost_weight = cost;
            payload.order_total = cost;
            payload.order_date = new Date().toISOString().split('T')[0];

            const { error } = await supabaseClient.from('full_landed_costs').insert(payload);
            if (error) throw new Error(error.message);
            
            ['m_name','m_neo_name','m_spec','m_neo_prod','m_cost'].forEach(id => document.getElementById(id).value = ''); document.getElementById('m_qty').value = '1'; 
            await loadData(); setMasterStatus("Added!", "mod-success"); setTimeout(() => document.getElementById('statusMaster').style.display = 'none', 2000);
        } catch(err) { sysLog(err.message, true); setMasterStatus("Failed.", "mod-error"); }
    }

    async function autofillNeoNames() {
        if (!confirm("Copy Neogleamz Names & Products to identical items missing them?")) return;
        sysLog("Auto-Fill start..."); setMasterStatus("Auto-filling...", "mod-working"); document.getElementById('statusMaster').style.display = 'inline-block'; setSysProgress(20, 'working');
        try {
            let dict = {};
            finalResults.forEach(r => { let k = `${String(r['Item Name']).trim()}:::${String(r['Specification']).trim()}`; let nn = String(r['Neogleamz Name']).trim(); let np = String(r['Neo Product']).trim(); if (!dict[k]) dict[k] = { n: "", p: "" }; if (nn && !dict[k].n) dict[k].n = nn; if (np && !dict[k].p) dict[k].p = np; });
            let ups = []; finalResults.forEach(r => { let k = `${String(r['Item Name']).trim()}:::${String(r['Specification']).trim()}`; let p = {}; let b = dict[k]; if (b.n && !String(r['Neogleamz Name']).trim()) p.neogleamz_name = b.n; if (b.p && !String(r['Neo Product']).trim()) p.neogleamz_product = b.p; if (Object.keys(p).length > 0) ups.push({ p: r['Parcel No'], d: r['DI Item ID'], pay: p }); });
            if (ups.length === 0) { sysLog("Up to date."); setMasterStatus("Up to date!", "mod-success"); setSysProgress(100, 'success'); setTimeout(() => { document.getElementById('statusMaster').style.display = 'none'; setSysProgress(0, 'working'); }, 3000); return; }
            sysLog(`Updating ${ups.length} items...`); setSysProgress(50, 'working');
            await Promise.all(ups.map(u => supabaseClient.from('full_landed_costs').update(u.pay).eq('parcel_no', u.p).eq('di_item_id', u.d)));
            sysLog(`Filled ${ups.length}!`); setMasterStatus("Complete!", "mod-success"); setSysProgress(100, 'success'); await loadData(); setTimeout(() => { document.getElementById('statusMaster').style.display = 'none'; setSysProgress(0, 'working'); }, 3000);
        } catch (err) { sysLog(err.message, true); setMasterStatus("Error Auto-Filling", "mod-error"); setSysProgress(100, 'error'); setTimeout(() => setSysProgress(0, 'working'), 3000); }
    }

    // --- 7. CATALOG & INVENTORY ---
    function fmtKey(key) { let p = key.split(":::"); return { nn: p[0]||"", np: p[1]||"", in: p[2]||"Unknown", sp: p[3]||"" }; }

    function buildCatalogCache() {
        catalogCache = {}; finalResults.forEach(r => {
            let nn = String(r['Neogleamz Name']||"").trim(); let np = String(r['Neo Product']||"").trim(); let inam = String(r['Item Name']||"Unknown").trim(); let sp = String(r['Specification']||"").trim();
            let k = `${nn}:::${np}:::${inam}:::${sp}`;
            if (k === "::::::Unknown:::") return; if(!catalogCache[k]) catalogCache[k] = { neoName: nn, neoProd: np, itemName: inam, spec: sp, totalCostSum: 0, totalQty: 0 };
            let qty = parseFloat(r['Quantity']) || 1; catalogCache[k].totalCostSum += (parseFloat(r['Final Landed Cost ($)']) || 0) * qty; catalogCache[k].totalQty += qty;
        });
        Object.keys(catalogCache).forEach(k => catalogCache[k].avgUnitCost = catalogCache[k].totalCostSum / (catalogCache[k].totalQty || 1));
    }

    function calculateProductTotal(pName, visited = new Set()) {
        if (visited.has(pName)) return 0; visited.add(pName); let tot = 0;
        (productsDB[pName] || []).forEach(part => {
            let k = String(part.item_key || part.di_item_id || part.name || ""); let q = parseFloat(part.quantity || part.qty) || 1;
            if (k.startsWith('RECIPE:::')) tot += (calculateProductTotal(k.replace('RECIPE:::', ''), new Set(visited)) * q); else if (catalogCache[k]) tot += (catalogCache[k].avgUnitCost * q);
        }); return tot;
    }

    function getRawMaterials(pName, mult = 1, map = {}, vis = new Set()) {
        if (vis.has(pName)) return map; vis.add(pName);
        (productsDB[pName] || []).forEach(part => {
            let k = String(part.item_key || part.di_item_id || part.name || ""); let q = (parseFloat(part.quantity || part.qty) || 1) * mult;
            if (k.startsWith('RECIPE:::')) getRawMaterials(k.replace('RECIPE:::', ''), q, map, new Set(vis)); else { map[k] = (map[k] || 0) + q; }
        }); return map;
    }

    // UPDATED: Structured Visual Dropdown with Emojis and Columns
    function populateDropdowns() {
        try {
            let recipes = `<optgroup label="📦 SUB-ASSEMBLIES (Your Products)">` + Object.keys(productsDB).sort().map(p => {
                let cost = calculateProductTotal(p).toFixed(2);
                return `<option value="RECIPE:::${p}">🟢 [Product] ${p}   ━━━━   💰 $${cost}/unit</option>`;
            }).join('') + `</optgroup>`;

            let raws = `<optgroup label="🔩 RAW COMPONENTS (From Ledger)">` + Object.keys(catalogCache).sort((a, b) => {
                let x = fmtKey(a), y = fmtKey(b); 
                if (x.np && !y.np) return -1; if (!x.np && y.np) return 1;
                if (x.nn && !y.nn) return -1; if (!x.nn && y.nn) return 1;
                return x.np.localeCompare(y.np) || x.nn.localeCompare(y.nn) || x.in.localeCompare(y.in);
            }).map(k => {
                let d = fmtKey(k);
                let np = d.np ? `【${d.np}】` : `【Uncategorized】`;
                let nn = d.nn ? `🔸 ${d.nn}` : ``;
                let inam = `📦 ${truncText(d.in, 45)}`;
                let sp = d.sp ? `⚙️ ${truncText(d.sp, 35)}` : ``;
                
                let textParts = [np];
                if (nn) textParts.push(nn);
                textParts.push(` |  ${inam}`);
                if (sp) textParts.push(` |  ${sp}`);
                
                let cost = catalogCache[k].avgUnitCost.toFixed(4);
                return `<option value="${k}">${textParts.join('   ')}   ━━━━   💰 $${cost}</option>`;
            }).join('') + `</optgroup>`;
            
            const ps = document.getElementById('partSelector'); if(ps) ps.innerHTML = '<option value="">-- Select a Component --</option>' + recipes + raws;
            const bs = document.getElementById('batchProductSelect'); if(bs) bs.innerHTML = '<option value="">-- Select Product to Build --</option>' + Object.keys(productsDB).sort().map(p => `<option value="${p}">📦 ${p}</option>`).join('');
        } catch(e) {}
    }

    async function syncRecipe(name) { try { sysLog(`Syncing recipe: ${name}`); const {error} = await supabaseClient.from('product_recipes').upsert({product_name: name, components: productsDB[name]}); if(error) throw new Error(error.message); populateDropdowns(); } catch(e) { sysLog(e.message, true); } }
    async function createNewProduct() { let n = prompt("Recipe Name:"); if(!n || !n.trim() || productsDB[n.trim()]) return; n = n.trim(); productsDB[n] = []; await syncRecipe(n); currentProduct = n; renderProductList(); renderProductBOM(); }
    function selectProduct(n) { currentProduct = n; renderProductList(); renderProductBOM(); }
    async function addPartToProduct() {
        if(!currentProduct) return alert("Select product."); let k = document.getElementById('partSelector').value; let q = parseFloat(document.getElementById('partQty').value) || 0;
        if(q<=0 || !k) return alert("Invalid inputs."); if(k === 'RECIPE:::' + currentProduct) return alert("No self nesting.");
        let ex = productsDB[currentProduct].find(p => String(p.item_key || p.di_item_id || p.name) === k); if(ex) { ex.quantity = (parseFloat(ex.quantity)||0) + q; ex.qty = ex.quantity; } else productsDB[currentProduct].push({item_key: k, quantity: q});
        await syncRecipe(currentProduct); renderProductBOM(); renderProductList();
    }
    async function removePart(btn) { if(!currentProduct) return; let k = btn.getAttribute('data-key'); productsDB[currentProduct] = productsDB[currentProduct].filter(p => String(p.item_key || p.di_item_id || p.name) !== k); await syncRecipe(currentProduct); renderProductBOM(); renderProductList(); }
    async function updateBOMQty(cell) {
        let v = parseFloat(cell.innerText.replace(/[^0-9.-]+/g,"")); if(isNaN(v) || v<=0) { cell.innerText=oldValTemp; return; } if(v.toString()===oldValTemp) return;
        let k = cell.getAttribute('data-key'); let p = productsDB[currentProduct].find(x => String(x.item_key || x.di_item_id || x.name) === k);
        if(p) { p.quantity = v; p.qty = v; cell.classList.add('edited-success'); setTimeout(()=>cell.classList.remove('edited-success'),1000); await syncRecipe(currentProduct); renderProductList(); }
    }
    async function deleteCurrentProduct() { if(!currentProduct) return; if(confirm(`Delete ${currentProduct}?`)){ sysLog(`Deleting ${currentProduct}`); await supabaseClient.from('product_recipes').delete().eq('product_name', currentProduct); delete productsDB[currentProduct]; let ups = []; Object.keys(productsDB).forEach(n => { let oL = productsDB[n].length; productsDB[n] = productsDB[n].filter(x => String(x.item_key || x.di_item_id || x.name) !== 'RECIPE:::'+currentProduct); if(productsDB[n].length !== oL) ups.push(supabaseClient.from('product_recipes').upsert({product_name: n, components: productsDB[n]})); }); if(ups.length>0) await Promise.all(ups); currentProduct = Object.keys(productsDB)[0]||null; populateDropdowns(); renderProductList(); } }
    async function nukeAllRecipes() { if(confirm("⚠️ DANGER: Delete ALL recipes?")){ sysLog("Nuking recipes..."); setMasterStatus("Nuking...", "mod-working"); document.getElementById('statusMaster').style.display='inline-block'; try{ const {error}=await supabaseClient.from('product_recipes').delete().neq('product_name','fake_key'); if(error) throw new Error(error.message); productsDB={}; currentProduct=null; renderProductList(); populateDropdowns(); document.getElementById('bomMainArea').style.display='none'; setMasterStatus("Nuked.", "mod-success"); setTimeout(()=>document.getElementById('statusMaster').style.display='none',3000); }catch(e){ sysLog(e.message, true); setMasterStatus("Fail.", "mod-error"); } } }

    function renderProductList() {
        const ui = document.getElementById('productListUI'); ui.innerHTML = ""; let prods = Object.keys(productsDB).sort();
        if(prods.length===0){ ui.innerHTML = "<li style='cursor:default; background:transparent; border:none; color:var(--text-main);'>No products.</li>"; document.getElementById('bomMainArea').style.display='none'; return; }
        if(!currentProduct && prods.length > 0) currentProduct = prods[0]; let subs = new Set();
        prods.forEach(p => (productsDB[p]||[]).forEach(x => { let k=String(x.item_key||x.di_item_id||x.name); if(k.startsWith('RECIPE:::')) subs.add(k.replace('RECIPE:::', '')); }));
        let top = prods.filter(p => !subs.has(p)); if(top.length===0 && prods.length > 0) top=prods;
        function buildTree(n, d, v) {
            if(v.has(n)) return ""; v.add(n); let sel = n===currentProduct ? 'selected' : '';
            let h = `<li class="${sel}" style="margin-left:${d*15}px; font-weight:${d>0?'normal':'bold'}; font-size:${d>0?'12px':'14px'};" onclick="selectProduct('${n.replace(/'/g,"\\'")}')"><span>${d>0?'<span style="color:var(--text-muted); margin-right:4px;">↳</span>':''}${n}</span><span class="prod-cost">$${calculateProductTotal(n).toFixed(2)}</span></li>`;
            (productsDB[n]||[]).forEach(x => { let k=String(x.item_key||x.di_item_id||x.name); if(k.startsWith('RECIPE:::')) { let s=k.replace('RECIPE:::', ''); if(productsDB[s]) h+=buildTree(s, d+1, new Set(v)); } }); return h;
        }
        top.forEach(p => ui.innerHTML += buildTree(p, 0, new Set())); if(currentProduct) renderProductBOM();
    }

    function renderProductBOM() {
        if(!currentProduct) return; document.getElementById('bomMainArea').style.display='block'; document.getElementById('bomTitle').innerText=currentProduct;
        let p = productsDB[currentProduct]||[]; let gt = 0; const tb = document.getElementById('bomTableBody'); tb.innerHTML="";
        if(p.length===0){ tb.innerHTML="<tr><td colspan='8' style='text-align:center;'>No components.</td></tr>"; document.getElementById('bomTotalCost').innerText="$0.00"; return; }
        p.forEach(x => {
            let k = String(x.item_key||x.di_item_id||x.name); let q = parseFloat(x.quantity||x.qty)||1; let nn="", np="", n="", sp="", uc=0;
            if(k.startsWith('RECIPE:::')) { let s = k.replace('RECIPE:::', ''); nn="📦"; np="Sub-Assembly"; n=s; sp=""; uc=calculateProductTotal(s); }
            else { let c = catalogCache[k]; if(c){ nn=c.neoName; np=c.neoProd; n=truncText(c.itemName,50); sp=truncText(c.spec,50); uc=c.avgUnitCost; } else { n="Unknown Item"; sp="N/A"; } }
            let ec = uc*q; gt+=ec; let sk = k.replace(/"/g,'&quot;');
            tb.innerHTML += `<tr><td style="font-weight:bold; color:var(--text-heading);">${nn}</td><td style="color:var(--text-muted);">${np}</td><td>${n}</td><td>${sp}</td><td class="text-right editable" style="font-weight:bold; color:#0ea5e9;" contenteditable="true" data-key="${sk}" onfocus="storeOldVal(this)" onblur="updateBOMQty(this)">${q}</td><td class="text-right">$${uc.toFixed(4)}</td><td class="text-right" style="font-weight:bold;">$${ec.toFixed(4)}</td><td style="text-align:center;"><button style="background:#ef4444; padding:4px 8px; font-size:12px; width:auto;" data-key="${sk}" onclick="removePart(this)">X</button></td></tr>`;
        }); document.getElementById('bomTotalCost').innerText = `$${gt.toFixed(2)}`;
    }

    function renderInventoryTable() {
        const tb = document.getElementById('inventoryBody'); if(!tb) return; tb.innerHTML="";
        let a = Object.keys(catalogCache).map(k => {
            let c = catalogCache[k], f = fmtKey(k), i = inventoryDB[k]||{consumed:0, adjustment:0}; let s=c.totalQty-i.consumed+i.adjustment; let up=c.avgUnitCost||0; let tp=s*up;
            return { k:k, nn:f.nn, np:f.np, n:f.in, sp:f.sp, p:c.totalQty, c:i.consumed, a:i.adjustment, s:s, up:up, tp:tp };
        });
        if(a.length===0){ tb.innerHTML="<tr><td colspan='10' style='text-align:center;'>No inventory.</td></tr>"; return; }
        document.querySelectorAll('.inv-sort-arrow').forEach(e => e.innerText=""); let ah=document.querySelector(`th[onclick="sortInventory('${currentInvSort.column}')"] .inv-sort-arrow`); if(ah) ah.innerText = currentInvSort.direction==='asc'?"▲":"▼";
        a.sort((x,y) => { 
            let u = x[currentInvSort.column]; let v = y[currentInvSort.column]; 
            if (typeof u === 'number' && typeof v === 'number') return currentInvSort.direction === 'asc' ? u - v : v - u;
            u = (u||"").toString().toLowerCase(); v = (v||"").toString().toLowerCase(); 
            if(u<v) return currentInvSort.direction==='asc'?-1:1; if(u>v) return currentInvSort.direction==='asc'?1:-1; return 0; 
        });
        a.forEach(x => {
            let sc = x.s<0 ? 'negative-stock' : 'highlight-calc'; let sk = x.k.replace(/'/g,"\\'");
            tb.innerHTML += `<tr><td style="font-weight:bold; color:var(--text-heading);">${x.nn}</td><td style="color:var(--text-muted);">${x.np}</td><td style="font-weight:bold;">${truncText(x.n,50)}</td><td>${truncText(x.sp,50)}</td><td class="text-right">$${x.up.toFixed(4)}</td><td class="text-right">${x.p.toFixed(4).replace(/\.?0+$/,'')}</td><td class="text-right editable" style="color:#ef4444;" contenteditable="true" onfocus="storeOldVal(this)" onblur="handleInvEdit(this,'${sk}',${x.p},${x.c},${x.a},'consumed')">${x.c.toFixed(4).replace(/\.?0+$/,'')}</td><td class="text-right" style="color:#0ea5e9;">${x.a!==0?(x.a>0?'+':'')+x.a.toFixed(4).replace(/\.?0+$/,''):'0'}</td><td class="text-right editable ${sc}" contenteditable="true" onfocus="storeOldVal(this)" onblur="handleInvEdit(this,'${sk}',${x.p},${x.c},${x.a},'stock')">${x.s.toFixed(4).replace(/\.?0+$/,'')}</td><td class="text-right" style="font-weight:bold; color:#10b981;">$${x.tp.toFixed(2)}</td></tr>`;
        });
    }

    function sortInventory(c) { currentInvSort = { column: c, direction: currentInvSort.column===c && currentInvSort.direction==='asc' ? 'desc' : 'asc' }; renderInventoryTable(); }

    async function handleInvEdit(cell, key, p, c, a, mode) {
        try {
            let v = parseFloat(cell.innerText.replace(/[^0-9.-]+/g,"")); if(isNaN(v)) { cell.innerText = mode==='consumed'?c:(p-c+a); return alert("Valid number required."); }
            let nc=c, na=a; if(mode==='consumed') { nc=Math.abs(v); if(nc===c) return; } else { na = v-(p-c); if(na===a) return; }
            sysLog(`Inv Edit: [${key}] ${mode} to ${v}`); setMasterStatus("Updating...", "mod-working"); document.getElementById('statusMaster').style.display='inline-block';
            const { error } = await supabaseClient.from('inventory_consumption').upsert({item_key: key, consumed_qty: nc, manual_adjustment: na}, {onConflict:'item_key'});
            if(error) throw new Error(error.message);
            if(!inventoryDB[key]) inventoryDB[key]={consumed:0, adjustment:0}; inventoryDB[key].consumed=nc; inventoryDB[key].adjustment=na;
            setMasterStatus("Adjusted!", "mod-success"); cell.classList.add('edited-success'); setTimeout(()=>cell.classList.remove('edited-success'),1000); setTimeout(()=>document.getElementById('statusMaster').style.display='none',2000); renderInventoryTable();
        } catch(e) { sysLog(e.message, true); setMasterStatus("Error", "mod-error"); cell.innerText = mode==='consumed'?c:(p-c+a); }
    }

    async function runProductionBatch() {
        const n = document.getElementById('batchProductSelect').value; const q = parseFloat(document.getElementById('batchQty').value);
        if(!n || isNaN(q) || q<=0) return alert("Select product & valid Qty."); sysLog(`Batch Run: ${q}x ${n}`); setSysProgress(20, 'working');
        try {
            let raw = getRawMaterials(n, q); let keys = Object.keys(raw); if(keys.length===0){ setSysProgress(0,'working'); return alert("Recipe empty."); }
            let ups = keys.map(k => { let i = inventoryDB[k]||{consumed:0, adjustment:0}; let nc = i.consumed + raw[k]; if(!inventoryDB[k]) inventoryDB[k]={consumed:0, adjustment:0}; inventoryDB[k].consumed=nc; return {item_key:k, consumed_qty:nc, manual_adjustment:i.adjustment}; });
            setSysProgress(60, 'working'); const {error} = await supabaseClient.from('inventory_consumption').upsert(ups, {onConflict:'item_key'}); if(error) throw new Error(error.message);
            setSysProgress(100, 'success'); sysLog("Batch Complete."); alert(`Deducted ${q}x ${n}.`); document.getElementById('batchQty').value=1; renderInventoryTable(); setTimeout(()=>setSysProgress(0,'working'),3000);
        } catch(e) { setSysProgress(100, 'error'); sysLog(e.message, true); alert("Batch Error."); }
    }

    async function resetInventoryConsumption() {
        if(!confirm("⚠️ DANGER: Reset ALL consumption AND manual adjustments?")) return; sysLog("Resetting Inventory..."); setSysProgress(50, 'working');
        try { const {error} = await supabaseClient.from('inventory_consumption').delete().neq('item_key', 'fake'); if(error) throw new Error(error.message); inventoryDB={}; renderInventoryTable(); setSysProgress(100, 'success'); sysLog("Reset."); setTimeout(()=>setSysProgress(0,'working'),3000); } catch(e) { setSysProgress(100, 'error'); sysLog(e.message, true); }
    }

    // --- 8. PARSERS & SYNC ---
    function setModuleStatus(id, m, t) { try{let e=document.getElementById(id); e.innerText=m; e.className=`mod-status ${t}`;}catch(x){} }
    document.getElementById('orderFiles').addEventListener('change', async(e)=>{if(e.target.files.length>0) await runFileImport(e.target, 'orders');});
    document.getElementById('parcelFiles').addEventListener('change', async(e)=>{if(e.target.files.length>0) await runFileImport(e.target, 'parcels');});

    async function runFileImport(inputNode, type) {
        inputNode.disabled = true; let statId = type==='orders' ? 'statusOrders' : 'statusParcels';
        setModuleStatus(statId, '⚙️ Extracting...', 'mod-working'); sysLog(`Starting ${type} extract...`); setSysProgress(20, 'working');
        try {
            let resObj = type === 'orders' ? await extractOrders(inputNode.files) : await extractParcels(inputNode.files);
            if (resObj.count > 0) {
                sysLog(`Pushing ${resObj.count} items...`); setSysProgress(80, 'working');
                const {error} = await supabaseClient.from(resObj.table).upsert(resObj.data, {onConflict: resObj.conflict}); if(error) throw new Error(error.message);
                if (resObj.data2) { const {error2} = await supabaseClient.from(resObj.table2).upsert(resObj.data2, {onConflict: resObj.conflict2}); if(error2) throw new Error(error2.message); }
                setSysProgress(100, 'success'); setModuleStatus(statId, `✅ Synced!`, 'mod-success'); inputNode.value = ""; setTimeout(()=>{setSysProgress(0,'working');syncAndCalculate();}, 1000);
            } else { setSysProgress(100, 'error'); setModuleStatus(statId, "❌ No valid data.", "mod-error"); setTimeout(()=>setSysProgress(0,'working'),3000); }
        } catch(e) { sysLog(e.message, true); setSysProgress(100, 'error'); setModuleStatus(statId, "❌ Error.", "mod-error"); setTimeout(()=>setSysProgress(0,'working'),3000); }
        inputNode.disabled = false;
    }

    async function extractOrders(files) {
        let a = [];
        for(let f of files) {
            const d = new DOMParser().parseFromString(await f.text(), 'text/html');
            Array.from(d.querySelectorAll('tbody, table, .order-list-item')).filter(el=>el.innerText.includes("Order No：")).forEach(b => {
                let bt = b.innerText; let oNo = (bt.match(/DO\d+/)||["N/A"])[0]; let dt = (bt.match(/\d{4}-\d{2}-\d{2}/)||[""])[0]; let oTot = bt.match(/Total Amount:.*?[￥$]\s*([\d.]+)/i)?parseFloat(bt.match(/Total Amount:.*?[￥$]\s*([\d.]+)/i)[1]):0; let post = bt.match(/Postage Inclusive:.*?[￥$]\s*([\d.]+)/i)?parseFloat(bt.match(/Postage Inclusive:.*?[￥$]\s*([\d.]+)/i)[1]):0;
                let trs = Array.from(b.querySelectorAll('tr')).filter(r=>r.innerText.match(/DI\d+/)); let tq=0; trs.forEach(r=>{ let cs=r.querySelectorAll('td'); if(cs.length>=3) tq+=parseInt(cs[2].innerText.replace(/[^0-9]/g,''))||0; });
                trs.forEach(r => {
                    let m = r.innerText.match(/DI\d+/); if(m && !r.innerText.includes("Order No：")){
                        let id = m[0], pn = ""; Array.from(r.querySelectorAll('a')).forEach(l=>{let t=l.getAttribute('title'),x=l.innerText.trim(); if(t&&t.length>10){pn=t;return;} if(x&&x.length>15&&!x.includes("DI26")){pn=x;return;}});
                        if(!pn || pn.toLowerCase().includes("product-img")) Array.from(r.querySelectorAll('img')).forEach(i=>{let a=i.getAttribute('alt'); if(a&&a.length>10&&!a.includes("代购商品")){pn=a;return;}});
                        pn = pn.replace('代购商品','').trim(); let sm = r.innerText.match(/(?:Specification model|specification|Product specifications|model|Color|size|power|Light color|Applicable Model)[：:]\s*([^\n\t\r]+)/i);
                        let sp = sm ? sm[1].trim().replace(/(?:Specification model|specification|Product specifications|model|Color|size|power|Light color|Applicable Model)[：:]/gi,'').trim() : "";
                        pn = pn.replace(/(?:Specification model|specification|Product specifications|model|Color|size|power|Light color|Applicable Model)[：:].*/i,'').trim(); if(sp&&pn.includes(sp)) pn=pn.replace(sp,'').trim(); pn=pn.replace(/[-\s,：:]+$/,'').trim();
                        let tId = r.innerText.match(/(?:ALIBABA|TB|Order):([\d-]+)/i)?r.innerText.match(/(?:ALIBABA|TB|Order):([\d-]+)/i)[1]:""; let up = r.innerText.match(/(?:US \$|CN ￥)\s*([\d.]+)/)?parseFloat(r.innerText.match(/(?:US \$|CN ￥)\s*([\d.]+)/)[1]):0; let q = parseInt(r.querySelectorAll('td')[2]?.innerText.replace(/[^0-9]/g,''))||1;
                        a.push({di_item_id:id, order_date:dt, order_no:oNo, alibaba_order:tId, item_name:pn, specification:sp, unit_price:up, quantity:q, postage:post, order_total:oTot, unit_china_landed_price:tq>0?(oTot/tq):0});
                    }
                });
            });
        } return { count: a.length, table: 'raw_orders', conflict: 'di_item_id', data: a };
    }

    async function extractParcels(files) {
        let sum=[], itm=[];
        for(let f of files) {
            const d = new DOMParser().parseFromString(await f.text(), 'text/html'); const bt = d.body.textContent.replace(/\s+/g,' ');
            let pm = bt.match(/PN\d{11}/); if(!pm) continue; let pNo = pm[0];
            let am = bt.match(/Actual Paid\s*:\s*US \$\s*([\d.]+)/); if(!am) continue; let aP = parseFloat(am[1]); let ab = bt.split(/Actual Paid\s*:\s*US \$\s*[\d.]+/)[1]||""; let aW = ab.match(/Actual Chargeable Weight\s*(\d+)\s*g/)?parseInt(ab.match(/Actual Chargeable Weight\s*(\d+)\s*g/)[1]):0;
            let xc = (n, isD=false) => { let m=ab.match(new RegExp(isD?`${n}\\s*-\\s*US \\$\\s*([\\d.]+)`:`${n}\\s*US \\$\\s*([\\d.]+)`,'i')); return m?parseFloat(m[1]):0; };
            sum.push({ parcel_no:pNo, actual_paid:aP, actual_chargeable_weight_g:aW, actual_shipping_fee:xc("Actual Shipping Fee"), first_tier_cost:xc("1st"), second_tier_cost:xc("2nd"), custom_clearance_fee:xc("Custom Clearance Fee"), remote_area_surcharge:xc("Remote area surcharge"), fuel_surcharge:xc("Fuel Surcharge"), operating_cost:xc("Operating Cost"), tax:xc("Tax"), insurance:xc("Insurance"), storage_fee:xc("Storage Fee"), epe_loose_filling:xc("EPE Loose Filling"), corner_protector:xc("Corner Protector"), moister_barrier_bag:xc("Moister-Barrier Bag"), packing_video:xc("Whole-Process Packing Video"), one_percent_discount:xc("1% Discount",true), points_discount:xc("Points Discount",true), coupon_discount:xc("Coupon Discount",true), discount_code:xc("Discount code Discount",true) });
            d.querySelectorAll('table').forEach(t=>{
                if(t.rows[0]&&t.rows[0].textContent.toLowerCase().includes('item name')&&t.rows[0].textContent.toLowerCase().includes('operation')) {
                    let cb=[], cbw=0; const pb=()=>{ if(cb.length>0){ let tq=cb.reduce((s,i)=>s+i.q,0); if(tq===0) tq=1; cb.forEach(i=>itm.push({parcel_no:pNo, di_item_id:i.d, item_name:i.n, specification:i.s, quantity:i.q, total_dist_weight_g:Math.round(cbw*(i.q/tq)), unit_weight_g:Math.round((cbw*(i.q/tq))/(i.q||1)*100)/100})); cb=[]; } };
                    for(let j=1; j<t.rows.length; j++){
                        let cs=t.rows[j].cells; if(cs.length>=3){
                            let rn=cs[0]?cs[0].textContent.replace(/View Inspection/g,'').replace(/\s+/g,' ').trim():''; if(!rn) continue;
                            let dc=rn.match(/DI\d{11}/)?rn.match(/DI\d{11}/)[0]:''; let rw=dc?rn.replace(dc,'').trim():rn;
                            let sl="specification|Color|model|Product specifications|Specification model|size|power|Light color|Applicable Model"; let sm=rw.match(new RegExp(`(?:${sl})[：:]\\s*(.*)`,'i'));
                            let sp=sm?sm[1].trim():''; let fn=sm?rw.replace(new RegExp(`(?:${sl})[：:]\\s*(.*)`,'i'),'').trim():rw; sp=sp.replace(new RegExp(`(?:${sl})[：:]`,'gi'),'').trim(); if(sp&&fn.includes(sp)) fn=fn.replace(sp,'').trim(); fn=fn.replace(/[-\s,：:]+$/,'').trim();
                            let q=parseInt(cs[1]?cs[1].textContent.trim():0)||0; let pw=parseInt(cs[2]?cs[2].textContent.trim():'');
                            if(!isNaN(pw)){pb(); cbw=pw; cb.push({d:dc,n:fn,s:sp,q:q});} else cb.push({d:dc,n:fn,s:sp,q:q});
                        }
                    } pb();
                }
            });
        } return { count: sum.length, table: 'raw_parcel_summary', conflict: 'parcel_no', data: sum, table2: 'raw_parcel_items', conflict2: 'parcel_no, di_item_id', data2: itm };
    }

    async function syncAndCalculate() {
        const btnCalc = document.getElementById('btnCalc'); btnCalc.disabled = true;
        setMasterStatus("⚙️ Downloading data...", "mod-working"); document.getElementById('statusMaster').style.display = 'inline-block'; sysLog("Sync/Calc..."); setSysProgress(20, 'working');
        try {
            const [oR, sR, iR, eR] = await Promise.all([ supabaseClient.from('raw_orders').select('*'), supabaseClient.from('raw_parcel_summary').select('*'), supabaseClient.from('raw_parcel_items').select('*'), supabaseClient.from('full_landed_costs').select('parcel_no, di_item_id, neogleamz_name, neogleamz_product, quantity') ]);
            if(oR.error) throw new Error(oR.error.message); if(sR.error) throw new Error(sR.error.message); if(iR.error) throw new Error(iR.error.message);
            if(!iR.data||iR.data.length===0) { sysLog("No raw items.", true); setSysProgress(0, 'working'); btnCalc.disabled=false; return; }
            sysLog("Calculating Math..."); setSysProgress(60, 'working'); setMasterStatus("🧮 Calculating...", "mod-working");
            let eM={}; if(eR.data) eR.data.forEach(r => eM[`${r.parcel_no}_${r.di_item_id}`]=r);
            let oM={}; (oR.data||[]).forEach(o => oM[o.di_item_id]=o); let sM={}; (sR.data||[]).forEach(s => sM[s.parcel_no]=s);
            let pT={}; iR.data.forEach(i => { if(!pT[i.parcel_no]) pT[i.parcel_no]={w:0}; pT[i.parcel_no].w += Number(i.total_dist_weight_g)||0; });
            let dI=[];
            iR.data.forEach(i => {
                let pN=i.parcel_no, d=i.di_item_id; let o=oM[d]||{}, s=sM[pN]||{}, e=eM[`${pN}_${d}`]||{};
                let q=e.quantity||i.quantity||1; let up=Number(o.unit_price)||0; let tw=Number(i.total_dist_weight_g)||0; let psc=Number(s.actual_paid)||0; let ptw=pT[pN].w||1;
                let uws=q>0?((tw/ptw)*psc/q):0; let fuc=up+uws;
                dI.push({ parcel_no:pN, di_item_id:d, item_name:i.item_name||o.item_name||"", specification:i.specification||o.specification||"", quantity:q, neogleamz_name:e.neogleamz_name||'', neogleamz_product:e.neogleamz_product||'', total_dist_weight_g:tw, unit_weight_g:i.unit_weight_g, order_date:o.order_date, order_no:o.order_no, alibaba_order:o.alibaba_order, order_unit_price:up, order_postage:o.postage, order_total:o.order_total, unit_china_landed_price:o.unit_china_landed_price, actual_paid:s.actual_paid, actual_chargeable_weight_g:s.actual_chargeable_weight_g, actual_shipping_fee:s.actual_shipping_fee, first_tier_cost:s.first_tier_cost, second_tier_cost:s.second_tier_cost, custom_clearance_fee:s.custom_clearance_fee, remote_area_surcharge:s.remote_area_surcharge, fuel_surcharge:s.fuel_surcharge, operating_cost:s.operating_cost, tax:s.tax, insurance:s.insurance, storage_fee:s.storage_fee, epe_loose_filling:s.epe_loose_filling, corner_protector:s.corner_protector, moister_barrier_bag:s.moister_barrier_bag, packing_video:s.packing_video, one_percent_discount:s.one_percent_discount, points_discount:s.points_discount, coupon_discount:s.coupon_discount, discount_code:s.discount_code, unit_ship_weight:uws, final_cost_weight:fuc, total_cost_weight:fuc*q });
            });
            sysLog(`Pushing ${dI.length} rows...`); setSysProgress(80, 'working');
            const {error} = await supabaseClient.from('full_landed_costs').upsert(dI, {onConflict:'parcel_no, di_item_id'}); if(error) throw new Error(error.message);
            await loadData(); setSysProgress(100, 'success'); setMasterStatus(`✅ Calculated!`, "mod-success"); setTimeout(()=>{document.getElementById('statusMaster').style.display='none'; setSysProgress(0,'working');}, 3000);
        } catch (error) { setSysProgress(100, 'error'); sysLog(error.message, true); setMasterStatus("❌ Calc Error.", "mod-error"); setTimeout(()=>setSysProgress(0,'working'), 3000); }
        btnCalc.disabled = false;
    }
</script>
